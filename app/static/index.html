<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLM Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --accent: #7c6af7;
    --accent2: #a78bfa;
    --text: #e8e8f0;
    --text-muted: #6b6b80;
    --user-bg: #1e1a3a;
    --user-border: #3d2f8a;
    --ai-bg: #16161a;
    --success: #34d399;
    --radius: 16px;
  }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .logo {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .status {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--success);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .clear-btn {
    margin-left: 16px;
    padding: 6px 14px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .clear-btn:hover {
    border-color: var(--accent);
    color: var(--accent2);
  }

  /* Messages */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .message {
    display: flex;
    gap: 12px;
    max-width: 780px;
    animation: fadeUp 0.25s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .message.user { margin-left: auto; flex-direction: row-reverse; }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .message.user .avatar {
    background: var(--user-bg);
    border: 1px solid var(--user-border);
  }

  .message.assistant .avatar {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
  }

  .bubble {
    padding: 14px 18px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.7;
    max-width: 640px;
    word-break: break-word;
    white-space: pre-wrap;
  }

  .message.user .bubble {
    background: var(--user-bg);
    border: 1px solid var(--user-border);
    border-radius: var(--radius) 4px var(--radius) var(--radius);
    color: var(--accent2);
  }

  .message.assistant .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px var(--radius) var(--radius) var(--radius);
    color: var(--text);
  }

  .meta {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
    padding: 0 4px;
  }

  .message.user .meta { text-align: right; }

  /* Typing indicator */
  .typing-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px var(--radius) var(--radius) var(--radius);
    padding: 16px 20px;
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .typing-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: bounce 1.2s infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* Welcome */
  .welcome {
    margin: auto;
    text-align: center;
    max-width: 420px;
    padding: 40px 20px;
    animation: fadeUp 0.4s ease;
  }

  .welcome-icon {
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    margin: 0 auto 20px;
  }

  .welcome h2 {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 10px;
    color: var(--text);
  }

  .welcome p {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.7;
    margin-bottom: 24px;
  }

  .suggestions {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .suggestion {
    padding: 10px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
  }

  .suggestion:hover {
    border-color: var(--accent);
    color: var(--accent2);
    background: var(--user-bg);
  }

  /* Input */
  .input-area {
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .input-wrap {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 12px;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within {
    border-color: var(--accent);
  }

  #input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    resize: none;
    max-height: 120px;
    min-height: 24px;
    line-height: 1.6;
  }

  #input::placeholder { color: var(--text-muted); }

  #send {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  #send:hover { background: var(--accent2); transform: scale(1.05); }
  #send:disabled { background: var(--border); cursor: not-allowed; transform: none; }

  #send svg { width: 16px; height: 16px; fill: white; }

  .hint {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 8px;
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <div class="logo">⚡</div>
  <h1>SLM Assistant</h1>
  <div class="status">
    <div class="status-dot"></div>
    <span>Groq · llama-3.3-70b</span>
  </div>
  <button class="clear-btn" onclick="clearHistory()">Clear chat</button>
</header>

<div id="messages">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">⚡</div>
    <h2>How can I help?</h2>
    <p>Ask me anything about the office. I'll find the answer from the knowledge base instantly.</p>
    <div class="suggestions">
      <button class="suggestion" onclick="sendSuggestion(this)">Where is the company located?</button>
      <button class="suggestion" onclick="sendSuggestion(this)">What are the office hours?</button>
      <button class="suggestion" onclick="sendSuggestion(this)">What is the WiFi password?</button>
      <button class="suggestion" onclick="sendSuggestion(this)">How do I request time off?</button>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-wrap">
    <textarea id="input" rows="1" placeholder="Ask anything…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="hint">Enter to send · Shift+Enter for new line</div>
</div>

<script>
  let isLoading = false;

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function sendSuggestion(btn) {
    document.getElementById('input').value = btn.textContent;
    sendMessage();
  }

  function formatTime() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function appendMessage(role, text) {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${role}`;

    const avatar = role === 'user' ? '👤' : '⚡';
    div.innerHTML = `
      <div class="avatar">${avatar}</div>
      <div>
        <div class="bubble">${escapeHtml(text)}</div>
        <div class="meta">${formatTime()}</div>
      </div>
    `;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  function showTyping() {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message assistant';
    div.id = 'typing';
    div.innerHTML = `
      <div class="avatar">⚡</div>
      <div class="typing-bubble">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    `;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\n/g, '<br>');
  }

  async function sendMessage() {
    if (isLoading) return;
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('send').disabled = true;
    isLoading = true;

    appendMessage('user', text);
    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });
      const data = await res.json();
      removeTyping();
      appendMessage('assistant', data.response || 'No response.');
    } catch (err) {
      removeTyping();
      appendMessage('assistant', 'Something went wrong. Please try again.');
    } finally {
      isLoading = false;
      document.getElementById('send').disabled = false;
      input.focus();
    }
  }

  async function clearHistory() {
    await fetch('/api/history/clear', { method: 'POST' });
    const messages = document.getElementById('messages');
    messages.innerHTML = `
      <div class="welcome" id="welcome">
        <div class="welcome-icon">⚡</div>
        <h2>How can I help?</h2>
        <p>Ask me anything about the office. I'll find the answer from the knowledge base instantly.</p>
        <div class="suggestions">
          <button class="suggestion" onclick="sendSuggestion(this)">Where is the company located?</button>
          <button class="suggestion" onclick="sendSuggestion(this)">What are the office hours?</button>
          <button class="suggestion" onclick="sendSuggestion(this)">What is the WiFi password?</button>
          <button class="suggestion" onclick="sendSuggestion(this)">How do I request time off?</button>
        </div>
      </div>
    `;
  }
</script>
</body>
</html>
