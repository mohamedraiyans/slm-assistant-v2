<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLM Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --accent: #7c6af7;
    --accent2: #a78bfa;
    --text: #e8e8f0;
    --text-muted: #6b6b80;
    --user-bg: #1e1a3a;
    --user-border: #3d2f8a;
    --ai-bg: #16161a;
    --success: #34d399;
    --danger: #f87171;
    --radius: 16px;
  }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
  }

  .app {
    display: flex;
    height: 100%;
  }

  /* Sidebar */
  .sidebar {
    width: 280px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 20px;
    gap: 16px;
    overflow-y: auto;
  }

  .sidebar h3 {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 4px;
  }

  .dropzone {
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    padding: 22px 12px;
    text-align: center;
    font-size: 12px;
    line-height: 1.6;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .dropzone:hover,
  .dropzone.dragover {
    border-color: var(--accent);
    color: var(--accent2);
    background: var(--user-bg);
  }

  .dropzone input { display: none; }

  .dropzone .dz-icon { font-size: 20px; display: block; margin-bottom: 6px; }
  .dropzone .dz-types { font-size: 10px; color: var(--text-muted); margin-top: 4px; }

  .upload-status {
    font-size: 11px;
    color: var(--accent2);
    min-height: 14px;
  }

  .doc-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .doc-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 8px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 12px;
  }

  .doc-name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--text);
  }

  .doc-remove {
    background: transparent;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 13px;
    flex-shrink: 0;
    line-height: 1;
    padding: 2px;
  }

  .doc-remove:hover { color: var(--danger); }

  .doc-empty {
    font-size: 12px;
    color: var(--text-muted);
    text-align: center;
    padding: 10px 0;
  }

  /* Chat panel */
  .chat-panel {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .sidebar-toggle {
    display: none;
    width: 32px;
    height: 32px;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 14px;
  }

  .logo {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .status {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--success);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .clear-btn {
    margin-left: 16px;
    padding: 6px 14px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .clear-btn:hover {
    border-color: var(--accent);
    color: var(--accent2);
  }

  /* Messages */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .message {
    display: flex;
    gap: 12px;
    max-width: 780px;
    animation: fadeUp 0.25s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .message.user { margin-left: auto; flex-direction: row-reverse; }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .message.user .avatar {
    background: var(--user-bg);
    border: 1px solid var(--user-border);
  }

  .message.assistant .avatar {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
  }

  .bubble {
    padding: 14px 18px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.7;
    max-width: 640px;
    word-break: break-word;
    white-space: pre-wrap;
  }

  .message.user .bubble {
    background: var(--user-bg);
    border: 1px solid var(--user-border);
    border-radius: var(--radius) 4px var(--radius) var(--radius);
    color: var(--accent2);
  }

  .message.assistant .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px var(--radius) var(--radius) var(--radius);
    color: var(--text);
    transition: background 0.2s, border-color 0.2s;
  }

  .message.assistant .bubble.match-good {
    background: rgba(52, 211, 153, 0.1);
    border-color: var(--success);
  }

  .message.assistant .bubble.match-medium {
    background: rgba(245, 166, 35, 0.1);
    border-color: #f5a623;
  }

  .message.assistant .bubble.match-low {
    background: rgba(248, 113, 113, 0.12);
    border-color: var(--danger);
  }

  .meta {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
    padding: 0 4px;
  }

  .message.user .meta { text-align: right; }

  .meta-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
  }

  .message.user .meta-row { justify-content: flex-end; }
  .message.user .meta-row .meta { margin-top: 0; }

  .edit-btn {
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    padding: 0;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
  }

  .message.user:hover .edit-btn { opacity: 1; }
  .edit-btn:hover { color: var(--accent2); }

  /* Similar results / sources */
  .sources {
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-width: 640px;
  }

  .sources-label {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    padding: 0 4px;
  }

  .source-item {
    padding: 9px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 12px;
  }

  .source-item.best-match {
    background: var(--user-bg);
    border: 1px solid var(--accent);
  }

  .best-match-label {
    font-size: 10px;
    color: var(--success);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    padding: 0 4px;
  }

  .source-head {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    color: var(--accent2);
    margin-bottom: 4px;
  }

  .source-score {
    color: var(--text-muted);
    flex-shrink: 0;
    font-weight: 600;
  }

  .source-score.match-good { color: var(--success); }
  .source-score.match-medium { color: #f5a623; }
  .source-score.match-low { color: var(--danger); }

  .source-text {
    color: var(--text-muted);
    line-height: 1.5;
  }

  .source-text mark {
    background: var(--accent);
    color: #fff;
    padding: 0 2px;
    border-radius: 3px;
  }

  /* Welcome */
  .welcome {
    margin: auto;
    text-align: center;
    max-width: 420px;
    padding: 40px 20px;
    animation: fadeUp 0.4s ease;
  }

  .welcome-icon {
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    margin: 0 auto 20px;
  }

  .welcome h2 {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 10px;
    color: var(--text);
  }

  .welcome p {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.7;
    margin-bottom: 24px;
  }

  .suggestions {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .suggestion {
    padding: 10px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
  }

  .suggestion:hover {
    border-color: var(--accent);
    color: var(--accent2);
    background: var(--user-bg);
  }

  /* Input */
  .input-area {
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .input-wrap {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 12px;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within {
    border-color: var(--accent);
  }

  #input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    resize: none;
    max-height: 120px;
    min-height: 24px;
    line-height: 1.6;
  }

  #input::placeholder { color: var(--text-muted); }

  #send {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  #send:hover { background: var(--accent2); transform: scale(1.05); }
  #send:disabled { background: var(--border); cursor: not-allowed; transform: none; }

  #send svg { width: 16px; height: 16px; fill: white; }

  .hint {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 8px;
    text-align: center;
  }

  @media (max-width: 720px) {
    .sidebar-toggle { display: flex; }
    .sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 20;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      box-shadow: 8px 0 24px rgba(0, 0, 0, 0.4);
    }
    .sidebar.open { transform: translateX(0); }
  }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div>
      <h3>Upload documents</h3>
      <div class="dropzone" id="dropzone">
        <span class="dz-icon">📄</span>
        Click or drag a file here
        <div class="dz-types">.txt · .pdf · .docx</div>
        <input type="file" id="fileInput" accept=".txt,.pdf,.docx" multiple>
      </div>
      <div class="upload-status" id="uploadStatus"></div>
    </div>
    <div>
      <h3>Knowledge base</h3>
      <div class="doc-list" id="docList">
        <div class="doc-empty">Loading…</div>
      </div>
    </div>
  </aside>

  <div class="chat-panel">
    <header>
      <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
      <div class="logo">⚡</div>
      <h1>SLM Assistant</h1>
      <div class="status">
        <div class="status-dot"></div>
        <span>Groq · llama-3.3-70b</span>
      </div>
      <button class="clear-btn" onclick="clearHistory()">Clear chat</button>
    </header>

    <div id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">⚡</div>
        <h2>How can I help?</h2>
        <p>Ask me anything about the office. I'll find the answer from the knowledge base instantly.</p>
        <div class="suggestions">
          <button class="suggestion" onclick="sendSuggestion(this)">Where is the company located?</button>
          <button class="suggestion" onclick="sendSuggestion(this)">What are the office hours?</button>
          <button class="suggestion" onclick="sendSuggestion(this)">What is the WiFi password?</button>
          <button class="suggestion" onclick="sendSuggestion(this)">How do I request time off?</button>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea id="input" rows="1" placeholder="Ask anything…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button id="send" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
        </button>
      </div>
      <div class="hint">Enter to send · Shift+Enter for new line</div>
    </div>
  </div>
</div>

<script>
  let isLoading = false;

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function sendSuggestion(btn) {
    document.getElementById('input').value = btn.textContent;
    sendMessage();
  }

  function editMessage(btn) {
    const messageDiv = btn.closest('.message.user');
    const rawText = messageDiv.dataset.text || '';

    // Drop this message and everything after it (its reply + any later turns)
    let node = messageDiv;
    while (node) {
      const next = node.nextElementSibling;
      node.remove();
      node = next;
    }

    const input = document.getElementById('input');
    input.value = rawText;
    autoResize(input);
    input.focus();
  }

  function formatTime() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\n/g, '<br>');
  }

  let lastQuery = '';

  const STOPWORDS = new Set([
    'a', 'an', 'the', 'is', 'are', 'was', 'were', 'be', 'been', 'being',
    'do', 'does', 'did', 'have', 'has', 'had', 'will', 'would', 'could',
    'should', 'may', 'might', 'shall', 'can', 'need', 'to', 'of', 'in',
    'on', 'at', 'by', 'for', 'with', 'about', 'as', 'into', 'through',
    'from', 'up', 'down', 'out', 'off', 'over', 'under', 'again', 'i',
    'me', 'my', 'we', 'our', 'you', 'your', 'he', 'she', 'it', 'they',
    'them', 'their', 'this', 'that', 'these', 'those', 'what', 'which',
    'who', 'how', 'when', 'where', 'why', 'and', 'but', 'or', 'not',
    'instead', 'coming',
  ]);

  function highlightMatches(text, query) {
    const escaped = escapeHtml(text);
    const words = [...new Set(
      query.toLowerCase().split(/\W+/).filter(w => w.length > 2 && !STOPWORDS.has(w))
    )];
    if (!words.length) return escaped;
    const pattern = new RegExp('\\b(' + words.map(w => w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|') + ')\\b', 'gi');
    return escaped.replace(pattern, '<mark>$1</mark>');
  }

  function scoreClass(score) {
    if (score >= 0.5) return 'match-good';
    if (score >= 0.25) return 'match-medium';
    return 'match-low';
  }

  function renderSourceItem(s, isBest) {
    return `
      <div class="source-item${isBest ? ' best-match' : ''}">
        <div class="source-head">
          <span>${escapeHtml(s.filename)}</span>
          <span class="source-score ${scoreClass(s.score)}">${Math.round(s.score * 100)}% match</span>
        </div>
        <div class="source-text">${highlightMatches(s.text, lastQuery)}</div>
      </div>
    `;
  }

  function renderSources(sources) {
    if (!sources || !sources.length) return '';
    const [best, ...rest] = sources;
    const bestHtml = `
      <div class="best-match-label">Best match</div>
      ${renderSourceItem(best, true)}
    `;
    const restHtml = rest.length ? `
      <div class="sources-label">Similar results</div>
      ${rest.map(s => renderSourceItem(s, false)).join('')}
    ` : '';
    return `
      <div class="sources">
        ${bestHtml}
        ${restHtml}
      </div>
    `;
  }

  function appendMessage(role, text, sources) {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${role}`;

    const avatar = role === 'user' ? '👤' : '⚡';
    const bubbleClass = role === 'assistant'
      ? scoreClass(sources && sources.length ? sources[0].score : 0)
      : '';
    div.innerHTML = `
      <div class="avatar">${avatar}</div>
      <div>
        <div class="bubble ${bubbleClass}">${escapeHtml(text)}</div>
        <div class="meta-row">
          <div class="meta">${formatTime()}</div>
          ${role === 'user' ? `<button class="edit-btn" onclick="editMessage(this)">✎ Edit</button>` : ''}
        </div>
        ${role === 'assistant' ? renderSources(sources) : ''}
      </div>
    `;
    if (role === 'user') div.dataset.text = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  function showTyping() {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message assistant';
    div.id = 'typing';
    div.innerHTML = `
      <div class="avatar">⚡</div>
      <div class="typing-bubble">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    `;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendMessage() {
    if (isLoading) return;
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;

    lastQuery = text;
    input.value = '';
    input.style.height = 'auto';
    document.getElementById('send').disabled = true;
    isLoading = true;

    appendMessage('user', text);
    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });
      const data = await res.json();
      removeTyping();
      appendMessage('assistant', data.response || 'No response.', data.sources);
    } catch (err) {
      removeTyping();
      appendMessage('assistant', 'Something went wrong. Please try again.');
    } finally {
      isLoading = false;
      document.getElementById('send').disabled = false;
      input.focus();
    }
  }

  async function clearHistory() {
    await fetch('/api/history/clear', { method: 'POST' });
    const messages = document.getElementById('messages');
    messages.innerHTML = `
      <div class="welcome" id="welcome">
        <div class="welcome-icon">⚡</div>
        <h2>How can I help?</h2>
        <p>Ask me anything about the office. I'll find the answer from the knowledge base instantly.</p>
        <div class="suggestions">
          <button class="suggestion" onclick="sendSuggestion(this)">Where is the company located?</button>
          <button class="suggestion" onclick="sendSuggestion(this)">What are the office hours?</button>
          <button class="suggestion" onclick="sendSuggestion(this)">What is the WiFi password?</button>
          <button class="suggestion" onclick="sendSuggestion(this)">How do I request time off?</button>
        </div>
      </div>
    `;
  }

  /* ---------------- Knowledge base sidebar ---------------- */

  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
  }

  async function loadDocuments() {
    try {
      const res = await fetch('/api/documents');
      const data = await res.json();
      renderDocuments(data.documents || []);
    } catch (err) {
      renderDocuments([]);
    }
  }

  function renderDocuments(docs) {
    const list = document.getElementById('docList');
    if (!docs.length) {
      list.innerHTML = '<div class="doc-empty">No documents yet</div>';
      return;
    }
    list.innerHTML = docs.map(name => `
      <div class="doc-item">
        <span class="doc-name" title="${escapeHtml(name)}">${escapeHtml(name)}</span>
        <button class="doc-remove" data-name="${escapeHtml(name)}" onclick="removeDocument(this.dataset.name)">✕</button>
      </div>
    `).join('');
  }

  async function removeDocument(name) {
    await fetch(`/api/documents/${encodeURIComponent(name)}`, { method: 'DELETE' });
    loadDocuments();
  }

  async function uploadFiles(fileList) {
    const status = document.getElementById('uploadStatus');
    const files = Array.from(fileList);
    for (const file of files) {
      status.textContent = `Indexing ${file.name}…`;
      const formData = new FormData();
      formData.append('file', file);
      try {
        const res = await fetch('/api/documents', { method: 'POST', body: formData });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Upload failed');
        status.textContent = `${file.name} indexed (${data.chunks_indexed} chunks)`;
      } catch (err) {
        status.textContent = `Failed: ${file.name} — ${err.message}`;
      }
    }
    loadDocuments();
    setTimeout(() => { status.textContent = ''; }, 4000);
  }

  function setupDropzone() {
    const zone = document.getElementById('dropzone');
    const input = document.getElementById('fileInput');

    zone.addEventListener('click', () => input.click());
    input.addEventListener('change', () => {
      if (input.files.length) uploadFiles(input.files);
      input.value = '';
    });

    ['dragover', 'dragenter'].forEach(evt =>
      zone.addEventListener(evt, e => {
        e.preventDefault();
        zone.classList.add('dragover');
      })
    );
    ['dragleave', 'drop'].forEach(evt =>
      zone.addEventListener(evt, e => {
        e.preventDefault();
        zone.classList.remove('dragover');
      })
    );
    zone.addEventListener('drop', e => {
      if (e.dataTransfer.files.length) uploadFiles(e.dataTransfer.files);
    });
  }

  setupDropzone();
  loadDocuments();
</script>
</body>
</html>
